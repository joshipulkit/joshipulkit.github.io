   <g id="text_1">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="85.7664" y="86.040183" transform="rotate(-0 85.7664 86.040183)">Sunlight</text>
   </g>
   <g id="text_2">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(50.027025 90.904851)">UV photolysis</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(44.635111 103.859308)">starts the chain</text>
   </g>
   <g id="text_3">
    <!-- Ozone (O$_3$) -->
    <g style="fill: #22303c" transform="translate(49.1064 142.857618)">
     <text>
      <tspan style="font: 700 12px 'DejaVu Sans'" x="0 10.201172 17.185547 25.429688 33.972656 42.111328 46.289062 51.773438 67.761914" y="-0.890625">Ozone (O)</tspan>
      <tspan style="font: 8.4px 'DejaVu Sans'" x="62.089453" y="1.078125">3</tspan>
     </text>
    </g>
   </g>
   <g id="text_4">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(44.799994 147.675411)">Creates excited</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(48.607884 160.629868)">oxygen atoms</text>
   </g>
   <g id="text_5">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="85.7664" y="199.628178" transform="rotate(-0 85.7664 199.628178)">Water vapour</text>
   </g>
   <g id="text_6">
    <!-- O($^1$D) + H$_2$O -->
    <g style="fill: #42505c" transform="translate(52.5864 204.982456)">
     <text>
      <tspan style="font: 10.5px 'DejaVu Sans'" x="0 8.264648 17.425503 25.510708 29.607144 32.94479 41.742642 45.080288 58.040215" y="-0.6156250000000014">O(D) + HO</tspan>
      <tspan style="font: 7.35px 'DejaVu Sans'" x="12.461709 53.076421" y="-4.640625000000001 1.1093749999999982">12</tspan>
     </text>
    </g>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(61.041361 217.936913)">forms OH</text>
   </g>
   <g id="text_7">
    <text style="fill: #1c6b63; font: 700 24px 'DejaVu Sans'; text-anchor: middle" x="252.72" y="148.43969" transform="rotate(-0 252.72 148.43969)">OH</text>
   </g>
   <g id="text_8">
    <text style="fill: #42505c; font: 11px 'DejaVu Sans'" transform="translate(208.145938 152.357237)">Hydroxyl radical</text>
    <text style="fill: #42505c; font: 11px 'DejaVu Sans'" transform="translate(195.305156 165.928573)">Short-lived, reactive,</text>
    <text style="fill: #42505c; font: 11px 'DejaVu Sans'" transform="translate(199.02625 179.499909)">chemically decisive</text>
   </g>
   <g id="text_9">
    <!-- Methane (CH$_4$) -->
    <g style="fill: #22303c" transform="translate(362.808 83.709791)">
     <text>
      <tspan style="font: 700 12px 'DejaVu Sans'" x="0 11.941406 20.080078 25.816406 34.359375 42.457031 51 59.138672 63.316406 68.800781 77.607422 93.437695" y="-0.875">Methane (CH)</tspan>
      <tspan style="font: 8.4px 'DejaVu Sans'" x="87.765234" y="1.09375">4</tspan>
     </text>
    </g>
   </g>
   <g id="text_10">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(330.494953 89.698477)">OH initiates methane oxidation</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(347.541047 102.652934)">and helps set its lifetime</text>
   </g>
   <g id="text_11">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="412.308" y="144.028511" transform="rotate(-0 412.308 144.028511)">Carbon monoxide</text>
   </g>
   <g id="text_12">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(353.170852 150.017197)">A major OH sink in the</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(364.788937 162.971654)">lower atmosphere</text>
   </g>
   <g id="text_13">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="412.308" y="204.347231" transform="rotate(-0 412.308 204.347231)">VOCs</text>
   </g>
   <g id="text_14">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(326.603391 210.335917)">Reactive organics feed oxidation</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(339.015539 223.290374)">chains and radical recycling</text>
   </g>
   <g id="text_15">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="129.96" y="297.788024" transform="rotate(-0 129.96 297.788024)">Tropospheric ozone</text>
   </g>
   <g id="text_16">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(63.31125 303.191264)">Secondary chemistry can</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(54.686484 316.145721)">build ozone near the surface</text>
   </g>
   <g id="text_17">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="257.6304" y="297.741149" transform="rotate(-0 257.6304 297.741149)">Secondary aerosols</text>
   </g>
   <g id="text_18">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(194.714072 303.191264)">Oxidation products help</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(209.652783 316.145721)">form fine particles</text>
   </g>
   <g id="text_19">
    <text style="fill: #22303c; font: 700 12px 'DejaVu Sans'; text-anchor: middle" x="385.3008" y="297.788024" transform="rotate(-0 385.3008 297.788024)">More soluble products</text>
   </g>
   <g id="text_20">
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(305.444198 303.191264)">Some products become easier</text>
    <text style="fill: #42505c; font: 10.5px 'DejaVu Sans'" transform="translate(338.488847 316.145721)">to remove by rain</text>
   </g>
   <g id="text_21">
    <text style="fill: #22303c; font: 700 13px 'DejaVu Sans'; text-anchor: middle" x="252.72" y="94.118166" transform="rotate(-0 252.72 94.118166)">How OH sits at the center of atmospheric self-cleaning</text>
   </g>
   <g id="text_22">
    <text style="fill: #4a5966; font: 10.5px 'DejaVu Sans'; text-anchor: middle" x="252.72" y="104.123584" transform="rotate(-0 252.72 104.123584)">A simplified chemistry map for general readers</text>
   </g>
   <g id="text_23">
    <text style="fill: #5d6773; font: 9px 'DejaVu Sans'; text-anchor: middle" x="252.72" y="353.854957" transform="rotate(-0 252.72 353.854957)">Conceptual figure based on IPCC AR6 Chapter 6, Lelieveld et al. (2004), and Price et al. (2025).</text>
   </g>
  </g>
 </g>
